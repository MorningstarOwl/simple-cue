set:
  name: Set cue
  description: Create or replace a named one-shot scheduled cue.
  fields:
    name:
      name: Name
      description: Unique slug for this cue (e.g. coffee, lights, medication).
      required: true
      example: coffee
      selector:
        text:
    datetime:
      name: Date/Time
      description: >
        When the cue should fire. Accepts natural language ("tomorrow at 7am",
        "in 2 hours", "next friday at 9pm", "monday at noon") or an
        ISO-8601 string ("2025-06-01T08:00:00").
      required: true
      example: "tomorrow at 7am"
      selector:
        text:

cancel:
  name: Cancel cue
  description: Cancel a cue by name. Does nothing if it doesn't exist.
  fields:
    name:
      name: Name
      description: The name of the cue to cancel.
      required: true
      example: coffee
      selector:
        text:

cancel_all:
  name: Cancel all cues
  description: Remove every active cue.
