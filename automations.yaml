# ===========================================================================
# Simple Cue — Automations
# ===========================================================================
# These automations react to the simple_cue_triggered event emitted by the
# Simple Cue integration whenever a scheduled cue fires.
#
# Prerequisites
# -------------
# • Simple Cue integration installed via HACS
# • input_boolean.simple_cue_debug declared in configuration.yaml:
#     input_boolean: !include input_boolean.yaml
#   (see input_boolean.yaml in this repo)

# ---------------------------------------------------------------------------
# 1. Action Dispatcher
# ---------------------------------------------------------------------------
# Dispatches the `action` payload from every simple_cue_triggered event.
#
# Action type routing
# -------------------
#   string  → re-issued as a voice command via conversation.process (primary)
#             The LLM executes it exactly as if the user had said it aloud.
#   dict    → executed directly as a single structured HA service call (legacy)
#   list    → each item executed as a structured HA service call (legacy)
#   null    → no-op (event-only cues handled by dedicated automations)
#
# String action example (LLM-scheduled cue):
#   action: "Turn off the living room lights"
#   → conversation.process(text="Turn off the living room lights")
#
# Dict action example (legacy structured payload):
#   action: {service: light.turn_off, target: {entity_id: light.living_room}}
#
# IMPORTANT: Set agent_id below to the entity_id of your Ollama conversation
# agent. Find it at Settings → Voice Assistants → [your agent] → Entity ID.
# The default below matches the most common Ollama integration entity name.

- alias: "Simple Cue — Action Dispatcher"
  id: simple_cue_action_dispatcher
  description: >-
    Routes simple_cue_triggered action payloads: strings are re-issued as
    voice commands via conversation.process; dicts and lists are executed
    as direct structured service calls (legacy fallback).
  trigger:
    - platform: event
      event_type: simple_cue_triggered
  condition:
    - condition: template
      value_template: "{{ trigger.event.data.action is not none }}"
  action:
    - choose:
        # -- String: re-issue as a voice command via the LLM ------------------
        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action is string }}"
          sequence:
            - service: conversation.process
              data:
                # The natural language sentence stored in the cue's action field.
                text: "{{ trigger.event.data.action }}"
                # Verify this matches your Ollama conversation agent entity ID.
                # Settings → Voice Assistants → [agent] → Entity ID
                agent_id: conversation.ollama_conversation

        # -- Dict: single structured service call (legacy) --------------------
        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action is mapping }}"
          sequence:
            - service: "{{ trigger.event.data.action.service }}"
              target: "{{ trigger.event.data.action.get('target', {}) }}"
              data: "{{ trigger.event.data.action.get('data', {}) }}"

        # -- List: sequence of structured service calls (legacy) --------------
        - conditions:
            - condition: template
              value_template: >-
                {{ trigger.event.data.action is sequence
                   and trigger.event.data.action is not string }}
          sequence:
            - repeat:
                for_each: "{{ trigger.event.data.action }}"
                sequence:
                  - service: "{{ repeat.item.service }}"
                    target: "{{ repeat.item.get('target', {}) }}"
                    data: "{{ repeat.item.get('data', {}) }}"
  mode: queued
  max: 20

# ---------------------------------------------------------------------------
# 2. Entity Cleanup & Debug Logger
# ---------------------------------------------------------------------------
# Refreshes sensor.simple_cue_count after every cue fires (stale entity
# cleanup) and optionally writes a persistent debug notification so you can
# confirm the fired cue name in the UI.
#
# Toggle debug logging by switching input_boolean.simple_cue_debug on/off
# in the Helpers section of the HA dashboard (or via a dashboard button).

- alias: "Simple Cue - Entity Cleanup & Debug"
  id: simple_cue_cleanup_debug
  description: >-
    Refreshes sensor.simple_cue_count after each cue fires and logs the
    fired cue name as a persistent notification when
    input_boolean.simple_cue_debug is on.
  trigger:
    - platform: event
      event_type: simple_cue_triggered
  variables:
    cue_name: "{{ trigger.event.data.name }}"
    fired_at: "{{ trigger.event.data.datetime }}"
  condition: []
  action:
    # Refresh the count sensor so the UI reflects the reduced cue count
    # immediately rather than waiting for the next natural polling cycle.
    - service: homeassistant.update_entity
      target:
        entity_id: sensor.simple_cue_count
    # Conditionally write a debug notification -- gated by the helper toggle.
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.simple_cue_debug
              state: "on"
          sequence:
            - service: persistent_notification.create
              data:
                title: "Simple Cue: Debug - cue fired"
                message: >-
                  Cue name  : {{ cue_name }}
                  Scheduled : {{ fired_at }}
                  Fired at  : {{ now().isoformat() }}
                notification_id: "simple_cue_debug_{{ cue_name }}"
  mode: parallel
  max: 10
